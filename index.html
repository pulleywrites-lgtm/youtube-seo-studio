<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube SEO Studio</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#f5f7ff;
  margin:0;
  padding:30px;
  color:#111827;
}

.container{
  max-width:1200px;
  margin:0 auto;
}

.card{
  background:white;
  border-radius:18px;
  padding:24px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
  margin-bottom:20px;
}

h1{
  font-family:'Nunito',sans-serif;
  margin-bottom:6px;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-weight:700;
  font-family:'Nunito',sans-serif;
}

.primary{
  background:#2563eb;
  color:white;
}

.red{
  background:#ff0000;
  color:white;
}

.green{
  background:#059669;
  color:white;
}

input, textarea, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-top:6px;
  margin-bottom:14px;
  font-family:'DM Sans',sans-serif;
}

.video{
  display:grid;
  grid-template-columns:120px 1fr 120px;
  gap:16px;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #eee;
}

.video:hover{
  background:#f3f6ff;
}

.thumb{
  width:120px;
  border-radius:10px;
}

.grade{
  width:50px;
  height:50px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:22px;
  color:white;
}

.A{background:#059669;}
.B{background:#2563eb;}
.C{background:#d97706;}
.D{background:#ea580c;}
.F{background:#dc2626;}

.hidden{
  display:none;
}

#previewModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

#previewCard{
  background:white;
  border-radius:20px;
  padding:24px;
  width:100%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
}

.small{
  font-size:13px;
  color:#6b7280;
}

.tag{
  display:inline-block;
  background:#eef2ff;
  color:#3730a3;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h1>YouTube SEO Studio</h1>
  <div class="small">Children's Content SEO Optimizer</div>

  <label>OAuth Client ID</label>
  <input id="clientIdInput" type="text" placeholder="xxxxx.apps.googleusercontent.com">

  <label>API Key</label>
  <input id="apiKeyInput" type="password" placeholder="AIza...">

  <button class="red" onclick="saveAndConnect()">
    Connect To YouTube
  </button>

  <div id="errorBox"></div>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
    <h2>Your Videos</h2>

    <button class="primary" onclick="loadAllVideos()">
      Refresh Videos
    </button>
  </div>

  <div id="videoList">
    <div class="small">
      Connect your YouTube account first.
    </div>
  </div>
</div>

</div>

<div id="previewModal">
  <div id="previewCard">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2 id="previewTitle">Preview</h2>

      <button onclick="closePreview()">
        Close
      </button>
    </div>

    <div id="previewContent"></div>
  </div>
</div>

<script>

const SCOPES = 'https://www.googleapis.com/auth/youtube.force-ssl';

let accessToken = null;
let allVideos = [];
let currentVideo = null;

const cacheKey = 'yt_uploads_cache_v1';
const cacheTimeKey = 'yt_uploads_cache_time_v1';

function showError(msg){
  document.getElementById('errorBox').innerHTML =
    '<div style="margin-top:14px;background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;">' +
    msg +
    '</div>';
}

function saveAndConnect(){

  const cid = document.getElementById('clientIdInput').value.trim();
  const key = document.getElementById('apiKeyInput').value.trim();

  if(!cid || !key){
    showError('Please enter both API credentials.');
    return;
  }

  localStorage.setItem('ytClientId', cid);
  localStorage.setItem('ytApiKey', key);

  initiateOAuth();
}

function initiateOAuth(){

  const clientId = localStorage.getItem('ytClientId');

  if(!window.google || !google.accounts){
    showError('Google SDK still loading.');
    return;
  }

  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPES,

    callback: async (response) => {

      if(response.error){
        showError(response.error);
        return;
      }

      accessToken = response.access_token;

      await loadAllVideos();
    }
  });

  client.requestAccessToken();
}

function getApiKey(){
  return localStorage.getItem('ytApiKey') || '';
}

function scoreTitle(title){

  let score = 40;

  if(title.length >= 30 && title.length <= 60){
    score += 20;
  }

  const powerWords = [
    'kids',
    'learn',
    'fun',
    'abc',
    'numbers',
    'toddlers',
    'baby'
  ];

  powerWords.forEach(word=>{
    if(title.toLowerCase().includes(word)){
      score += 5;
    }
  });

  return Math.min(score,100);
}

function scoreDescription(desc){

  if(!desc) return 10;

  let score = 20;

  if(desc.length > 150) score += 20;
  if(desc.includes('#')) score += 10;
  if(desc.toLowerCase().includes('subscribe')) score += 10;

  return Math.min(score,100);
}

function scoreTags(tags){

  if(!tags || !tags.length){
    return 10;
  }

  let score = 30;

  if(tags.length >= 5) score += 20;
  if(tags.length >= 10) score += 20;

  return Math.min(score,100);
}

function getGrade(score){

  if(score >= 85) return 'A';
  if(score >= 70) return 'B';
  if(score >= 55) return 'C';
  if(score >= 40) return 'D';

  return 'F';
}

async function loadAllVideos(){

  if(!accessToken){
    showError('Please connect first.');
    return;
  }

  const apiKey = getApiKey();

  document.getElementById('videoList').innerHTML =
    '<div>Loading videos...</div>';

  try{

    let allItems = [];
    let pageToken = '';

    do{

      const url =
        `https://www.googleapis.com/youtube/v3/search?part=snippet&forMine=true&type=video&maxResults=50&order=date${pageToken ? '&pageToken=' + pageToken : ''}&key=${apiKey}`;

      const response = await fetch(url,{
        headers:{
          Authorization:'Bearer ' + accessToken
        }
      });

      const data = await response.json();

      if(data.error){
        throw new Error(data.error.message);
      }

      allItems = allItems.concat(data.items || []);
      pageToken = data.nextPageToken || '';

    }while(pageToken);

    const ids = allItems
      .map(v=>v.id.videoId)
      .filter(Boolean);

    let details = [];

    for(let i=0;i<ids.length;i+=50){

      const chunk = ids.slice(i,i+50).join(',');

      const url2 =
        `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${chunk}&key=${apiKey}`;

      const r2 = await fetch(url2,{
        headers:{
          Authorization:'Bearer ' + accessToken
        }
      });

      const d2 = await r2.json();

      details = details.concat(d2.items || []);
    }

    allVideos = details.map(video=>{

      const s = video.snippet || {};

      const titleScore = scoreTitle(s.title || '');
      const descScore = scoreDescription(s.description || '');
      const tagsScore = scoreTags(s.tags || []);

      const overall =
        Math.round(
          (titleScore + descScore + tagsScore) / 3
        );

      return{
        id:video.id,
        title:s.title || '',
        description:s.description || '',
        tags:s.tags || [],
        thumb:s.thumbnails?.medium?.url || '',
        score:overall,
        grade:getGrade(overall),
        categoryId:s.categoryId || '22'
      };
    });

    renderVideos();

  }catch(err){

    showError(err.message);

    document.getElementById('videoList').innerHTML =
      '<div>Error loading videos.</div>';
  }
}

function renderVideos(){

  if(!allVideos.length){

    document.getElementById('videoList').innerHTML =
      '<div>No videos found.</div>';

    return;
  }

  document.getElementById('videoList').innerHTML =
    allVideos.map(video=>`

      <div class="video" onclick="openPreview('${video.id}')">

        <img class="thumb" src="${video.thumb}">

        <div>
          <div style="font-weight:700;margin-bottom:4px;">
            ${escapeHtml(video.title)}
          </div>

          <div class="small">
            SEO Score: ${video.score}
          </div>
        </div>

        <div class="grade ${video.grade}">
          ${video.grade}
        </div>

      </div>

    `).join('');
}

function openPreview(videoId){

  const video = allVideos.find(v=>v.id===videoId);

  if(!video) return;

  currentVideo = video;

  const improvedTitle =
    video.title + ' | Fun Learning For Kids!';

  const improvedDescription =
`🌟 Welcome to today's educational kids video!

In this fun learning video your child will enjoy exciting educational moments designed for toddlers and preschoolers.

✅ Perfect for:
• Toddlers
• Preschoolers
• Early learning

🔔 Subscribe for more kids learning videos!

#KidsLearning #ToddlerLearning #Preschool`;

  const improvedTags = [
    'kids learning',
    'toddler learning',
    'preschool learning',
    'educational videos for kids',
    'fun learning'
  ];

  document.getElementById('previewTitle').innerText =
    video.title;

  document.getElementById('previewContent').innerHTML = `

    <h3>Optimized Title</h3>

    <textarea id="editTitle" rows="2">${improvedTitle}</textarea>

    <h3>Description</h3>

    <textarea id="editDescription" rows="8">${improvedDescription}</textarea>

    <h3>Tags</h3>

    <div>
      ${improvedTags.map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>

    <textarea id="editTags" rows="3">${improvedTags.join(', ')}</textarea>

    <h3>Category</h3>

    <select id="editCategory">
      <option value="22">People & Blogs</option>
      <option value="27" selected>Education</option>
      <option value="10">Music</option>
      <option value="24">Entertainment</option>
    </select>

    <div style="margin-top:20px;">
      <button class="green" onclick="pushToYouTube()">
        Push To YouTube
      </button>
    </div>

  `;

  document.getElementById('previewModal').style.display =
    'flex';
}

async function pushToYouTube(){

  if(!currentVideo){
    return;
  }

  try{

    const title =
      document.getElementById('editTitle').value;

    const description =
      document.getElementById('editDescription').value;

    const tags =
      document
        .getElementById('editTags')
        .value
        .split(',')
        .map(t=>t.trim())
        .filter(Boolean);

    const categoryId =
      document.getElementById('editCategory').value;

    const apiKey = getApiKey();

    // GET EXISTING VIDEO DATA FIRST
    const getUrl =
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${currentVideo.id}&key=${apiKey}`;

    const getResponse = await fetch(getUrl,{
      headers:{
        Authorization:'Bearer ' + accessToken
      }
    });

    const getData = await getResponse.json();

    const existing =
      getData.items[0];

    if(!existing){
      throw new Error('Could not fetch video.');
    }

    const snippet =
      existing.snippet;

    // UPDATE VIDEO
    const updateResponse = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&key=${apiKey}`,
      {
        method:'PUT',

        headers:{
          Authorization:'Bearer ' + accessToken,
          'Content-Type':'application/json'
        },

        body:JSON.stringify({
          id:currentVideo.id,

          snippet:{
            categoryId:categoryId,
            title:title,
            description:description,
            tags:tags,
            defaultLanguage:snippet.defaultLanguage,
            channelId:snippet.channelId
          }
        })
      }
    );

    const updateData =
      await updateResponse.json();

    if(updateData.error){
      throw new Error(updateData.error.message);
    }

    alert('Successfully updated video metadata!');

    closePreview();

    await loadAllVideos();

  }catch(err){

    alert(err.message);
  }
}

function closePreview(){

  document.getElementById('previewModal').style.display =
    'none';
}

function escapeHtml(text){

  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

window.addEventListener('load',()=>{

  console.log('YouTube SEO Studio loaded successfully');

  const savedClientId =
    localStorage.getItem('ytClientId');

  const savedApiKey =
    localStorage.getItem('ytApiKey');

  if(savedClientId){
    document.getElementById('clientIdInput').value =
      savedClientId;
  }

  if(savedApiKey){
    document.getElementById('apiKeyInput').value =
      savedApiKey;
  }
});

</script>

</body>
</html>
