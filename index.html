<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>YouTube SEO Studio</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  padding:30px;
  background:#f5f7ff;
  font-family:'DM Sans',sans-serif;
  color:#111827;
}

.container{
  max-width:1200px;
  margin:0 auto;
}

.card{
  background:white;
  border-radius:18px;
  padding:24px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
  margin-bottom:20px;
}

h1,h2,h3{
  font-family:'Nunito',sans-serif;
}

input,
textarea,
select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #d1d5db;
  margin-top:6px;
  margin-bottom:16px;
  font-family:'DM Sans',sans-serif;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-weight:700;
  font-family:'Nunito',sans-serif;
}

.red{
  background:#ff0000;
  color:white;
}

.blue{
  background:#2563eb;
  color:white;
}

.green{
  background:#059669;
  color:white;
}

.small{
  font-size:13px;
  color:#6b7280;
}

.video{
  display:grid;
  grid-template-columns:120px 1fr 80px;
  gap:16px;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.video:hover{
  background:#f3f6ff;
}

.thumb{
  width:120px;
  border-radius:12px;
}

.grade{
  width:54px;
  height:54px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:800;
  font-size:22px;
}

.A{background:#059669;}
.B{background:#2563eb;}
.C{background:#d97706;}
.D{background:#ea580c;}
.F{background:#dc2626;}

.tag{
  display:inline-block;
  background:#eef2ff;
  color:#3730a3;
  padding:6px 10px;
  border-radius:999px;
  margin:4px;
  font-size:12px;
}

#previewModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

#previewCard{
  background:white;
  border-radius:20px;
  padding:24px;
  width:100%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
}

.error{
  background:#fee2e2;
  color:#991b1b;
  padding:12px;
  border-radius:12px;
  margin-top:14px;
}

.success{
  background:#dcfce7;
  color:#166534;
  padding:12px;
  border-radius:12px;
  margin-top:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>YouTube SEO Studio</h1>

<div class="small">
Children's Content SEO Optimizer
</div>

<label>OAuth Client ID</label>

<input
  id="clientIdInput"
  type="text"
  placeholder="xxxxx.apps.googleusercontent.com"
/>

<label>API Key</label>

<input
  id="apiKeyInput"
  type="password"
  placeholder="AIza..."
/>

<button class="red" onclick="saveAndConnect()">
Connect To YouTube
</button>

<div id="statusBox"></div>

</div>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

<h2>Your Videos</h2>

<button class="blue" onclick="loadAllVideos()">
Refresh Videos
</button>

</div>

<div id="videoList">

<div class="small">
Connect your YouTube account first.
</div>

</div>

</div>

</div>

<div id="previewModal">

<div id="previewCard">

<div style="display:flex;justify-content:space-between;align-items:center;">

<h2 id="previewTitle">Preview</h2>

<button onclick="closePreview()">
Close
</button>

</div>

<div id="previewContent"></div>

</div>

</div>

<script>

const SCOPES =
'https://www.googleapis.com/auth/youtube.force-ssl';

let accessToken = null;
let allVideos = [];
let currentVideo = null;

function showError(message){

  document.getElementById('statusBox').innerHTML =
    `<div class="error">${message}</div>`;
}

function showSuccess(message){

  document.getElementById('statusBox').innerHTML =
    `<div class="success">${message}</div>`;
}

function getApiKey(){

  return localStorage.getItem('ytApiKey') || '';
}

function saveAndConnect(){

  const clientId =
    document.getElementById('clientIdInput')
    .value
    .trim();

  const apiKey =
    document.getElementById('apiKeyInput')
    .value
    .trim();

  if(!clientId || !apiKey){

    showError('Please enter both credentials.');

    return;
  }

  localStorage.setItem(
    'ytClientId',
    clientId
  );

  localStorage.setItem(
    'ytApiKey',
    apiKey
  );

  initiateOAuth();
}

function initiateOAuth(){

  const clientId =
    localStorage.getItem('ytClientId');

  if(!window.google || !google.accounts){

    showError(
      'Google SDK still loading.'
    );

    return;
  }

  const client =
    google.accounts.oauth2.initTokenClient({

      client_id:clientId,

      scope:SCOPES,

      callback:async(response)=>{

        if(response.error){

          showError(response.error);

          return;
        }

        accessToken =
          response.access_token;

        showSuccess(
          'Connected successfully!'
        );

        await loadAllVideos();
      }
    });

  client.requestAccessToken();
}

function scoreTitle(title){

  let score = 40;

  if(
    title.length >= 30 &&
    title.length <= 60
  ){
    score += 20;
  }

  const words = [
    'kids',
    'learn',
    'fun',
    'toddlers',
    'abc',
    'numbers',
    'colors'
  ];

  words.forEach(word=>{

    if(
      title
      .toLowerCase()
      .includes(word)
    ){
      score += 5;
    }
  });

  return Math.min(score,100);
}

function scoreDescription(desc){

  if(!desc) return 10;

  let score = 20;

  if(desc.length > 150){
    score += 20;
  }

  if(desc.includes('#')){
    score += 10;
  }

  if(
    desc.toLowerCase()
    .includes('subscribe')
  ){
    score += 10;
  }

  return Math.min(score,100);
}

function scoreTags(tags){

  if(!tags || !tags.length){
    return 10;
  }

  let score = 30;

  if(tags.length >= 5){
    score += 20;
  }

  if(tags.length >= 10){
    score += 20;
  }

  return Math.min(score,100);
}

function getGrade(score){

  if(score >= 85) return 'A';
  if(score >= 70) return 'B';
  if(score >= 55) return 'C';
  if(score >= 40) return 'D';

  return 'F';
}

async function loadAllVideos(){

  if(!accessToken){

    showError(
      'Please connect first.'
    );

    return;
  }

  const apiKey = getApiKey();

  document.getElementById('videoList')
  .innerHTML =
    '<div>Loading videos...</div>';

  try{

    // CHANNEL INFO

    const channelResponse =
      await fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&mine=true&key=${apiKey}`,
        {
          headers:{
            Authorization:
              'Bearer ' + accessToken
          }
        }
      );

    const channelData =
      await channelResponse.json();

    if(channelData.error){

      throw new Error(
        channelData.error.message
      );
    }

    const uploadsPlaylistId =
      channelData
      .items[0]
      .contentDetails
      .relatedPlaylists
      .uploads;

    // GET VIDEOS FROM UPLOADS PLAYLIST

    let pageToken = '';
    let videoIds = [];

    do{

      const playlistResponse =
        await fetch(
          `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsPlaylistId}&maxResults=50&pageToken=${pageToken}&key=${apiKey}`,
          {
            headers:{
              Authorization:
                'Bearer ' + accessToken
            }
          }
        );

      const playlistData =
        await playlistResponse.json();

      if(playlistData.error){

        throw new Error(
          playlistData.error.message
        );
      }

      const ids =
        (playlistData.items || [])
        .map(
          item=>
            item
            .snippet
            .resourceId
            .videoId
        )
        .filter(Boolean);

      videoIds =
        videoIds.concat(ids);

      pageToken =
        playlistData.nextPageToken || '';

    }while(pageToken);

    // VIDEO DETAILS

    let details = [];

    for(
      let i=0;
      i<videoIds.length;
      i+=50
    ){

      const chunk =
        videoIds
        .slice(i,i+50)
        .join(',');

      const videoResponse =
        await fetch(
          `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${chunk}&key=${apiKey}`,
          {
            headers:{
              Authorization:
                'Bearer ' + accessToken
            }
          }
        );

      const videoData =
        await videoResponse.json();

      details =
        details.concat(
          videoData.items || []
        );
    }

    allVideos =
      details.map(video=>{

        const s =
          video.snippet || {};

        const titleScore =
          scoreTitle(s.title || '');

        const descScore =
          scoreDescription(
            s.description || ''
          );

        const tagsScore =
          scoreTags(
            s.tags || []
          );

        const overall =
          Math.round(
            (
              titleScore +
              descScore +
              tagsScore
            ) / 3
          );

        return{
          id:video.id,
          title:s.title || '',
          description:s.description || '',
          tags:s.tags || [],
          thumb:
            s.thumbnails?.medium?.url || '',
          score:overall,
          grade:getGrade(overall),
          categoryId:
            s.categoryId || '22'
        };
      });

    renderVideos();

  }catch(error){

    showError(error.message);

    document.getElementById('videoList')
    .innerHTML =
      '<div>Error loading videos.</div>';
  }
}

function renderVideos(){

  if(!allVideos.length){

    document.getElementById('videoList')
    .innerHTML =
      '<div>No videos found.</div>';

    return;
  }

  document.getElementById('videoList')
  .innerHTML =
    allVideos.map(video=>`

      <div
        class="video"
        onclick="openPreview('${video.id}')"
      >

        <img
          class="thumb"
          src="${video.thumb}"
        />

        <div>

          <div
            style="font-weight:700;margin-bottom:4px;"
          >
            ${escapeHtml(video.title)}
          </div>

          <div class="small">
            SEO Score:
            ${video.score}
          </div>

        </div>

        <div class="grade ${video.grade}">
          ${video.grade}
        </div>

      </div>

    `).join('');
}

function openPreview(videoId){

  const video =
    allVideos.find(
      v=>v.id===videoId
    );

  if(!video) return;

  currentVideo = video;

  const improvedTitle =
    video.title +
    ' | Fun Learning For Kids!';

  const improvedDescription =
`🌟 Welcome to today's educational kids video!

In this fun learning video your child will enjoy exciting educational moments designed for toddlers and preschoolers.

✅ Perfect for:
• Toddlers
• Preschoolers
• Early learning

🔔 Subscribe for more kids learning videos!

#KidsLearning #ToddlerLearning #Preschool`;

  const improvedTags = [
    'kids learning',
    'toddler learning',
    'preschool learning',
    'educational videos for kids',
    'fun learning'
  ];

  document.getElementById(
    'previewTitle'
  ).innerText =
    video.title;

  document.getElementById(
    'previewContent'
  ).innerHTML = `

    <h3>Optimized Title</h3>

    <textarea
      id="editTitle"
      rows="2"
    >${improvedTitle}</textarea>

    <h3>Description</h3>

    <textarea
      id="editDescription"
      rows="8"
    >${improvedDescription}</textarea>

    <h3>Tags</h3>

    <div>
      ${improvedTags
        .map(
          t=>`<span class="tag">${t}</span>`
        )
        .join('')
      }
    </div>

    <textarea
      id="editTags"
      rows="3"
    >${improvedTags.join(', ')}</textarea>

    <h3>Category</h3>

    <select id="editCategory">
      <option value="22">
        People & Blogs
      </option>

      <option
        value="27"
        selected
      >
        Education
      </option>

      <option value="10">
        Music
      </option>

      <option value="24">
        Entertainment
      </option>
    </select>

    <div style="margin-top:20px;">

      <button
        class="green"
        onclick="pushToYouTube()"
      >
        Push To YouTube
      </button>

    </div>
  `;

  document.getElementById(
    'previewModal'
  ).style.display =
    'flex';
}

async function pushToYouTube(){

  if(!currentVideo){
    return;
  }

  try{

    const title =
      document.getElementById(
        'editTitle'
      ).value;

    const description =
      document.getElementById(
        'editDescription'
      ).value;

    const tags =
      document
      .getElementById('editTags')
      .value
      .split(',')
      .map(t=>t.trim())
      .filter(Boolean);

    const categoryId =
      document.getElementById(
        'editCategory'
      ).value;

    const apiKey =
      getApiKey();

    // FETCH EXISTING VIDEO

    const getResponse =
      await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${currentVideo.id}&key=${apiKey}`,
        {
          headers:{
            Authorization:
              'Bearer ' + accessToken
          }
        }
      );

    const getData =
      await getResponse.json();

    const existing =
      getData.items[0];

    if(!existing){

      throw new Error(
        'Could not fetch video.'
      );
    }

    const snippet =
      existing.snippet;

    // UPDATE VIDEO

    const updateResponse =
      await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=snippet&key=${apiKey}`,
        {
          method:'PUT',

          headers:{
            Authorization:
              'Bearer ' + accessToken,

            'Content-Type':
              'application/json'
          },

          body:JSON.stringify({

            id:currentVideo.id,

            snippet:{

              categoryId:categoryId,

              title:title,

              description:description,

              tags:tags,

              defaultLanguage:
                snippet.defaultLanguage,

              channelId:
                snippet.channelId
            }
          })
        }
      );

    const updateData =
      await updateResponse.json();

    if(updateData.error){

      throw new Error(
        updateData.error.message
      );
    }

    showSuccess(
      'Video updated successfully!'
    );

    closePreview();

    await loadAllVideos();

  }catch(error){

    alert(error.message);
  }
}

function closePreview(){

  document.getElementById(
    'previewModal'
  ).style.display =
    'none';
}

function escapeHtml(text){

  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

window.addEventListener('load',()=>{

  console.log(
    'YouTube SEO Studio loaded successfully'
  );

  const savedClientId =
    localStorage.getItem(
      'ytClientId'
    );

  const savedApiKey =
    localStorage.getItem(
      'ytApiKey'
    );

  if(savedClientId){

    document.getElementById(
      'clientIdInput'
    ).value =
      savedClientId;
  }

  if(savedApiKey){

    document.getElementById(
      'apiKeyInput'
    ).value =
      savedApiKey;
  }
});

</script>

</body>
</html>
